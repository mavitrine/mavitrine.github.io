<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e"><div style="width:840px;height:630px">
  <svg viewBox="0 0 320 240" width="840" height="630" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
    <defs>
      <radialGradient id="t2bg" cx="32%" cy="14%" r="120%">
        <stop offset="0" stop-color="#1c4c44"/>
        <stop offset="55%" stop-color="#103b34"/>
        <stop offset="100%" stop-color="#07211d"/>
      </radialGradient>
      <linearGradient id="t2blade" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#5AD2C4"/>
        <stop offset="55%" stop-color="#40897a"/>
        <stop offset="100%" stop-color="#2a635a"/>
      </linearGradient>
      <linearGradient id="t2comb" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#40897a"/>
        <stop offset="100%" stop-color="#1c4c44"/>
      </linearGradient>
      <radialGradient id="t2vig" cx="48%" cy="46%" r="74%">
        <stop offset="52%" stop-color="#000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#04140f" stop-opacity="0.5"/>
      </radialGradient>
    </defs>
    <rect width="320" height="240" fill="url(#t2bg)"/>

    <!-- comb, resting diagonally beneath -->
    <g transform="translate(64,202) rotate(-32)">
      <rect x="0" y="-13" width="196" height="12" rx="6" fill="url(#t2comb)"/>
      <rect x="4" y="-11" width="150" height="1.6" rx="1" fill="#cfeee6" opacity="0.25"/>
      <g stroke="#2a635a" stroke-width="2.4" stroke-linecap="round">
        <line x1="10" y1="-1" x2="10" y2="12"/><line x1="20" y1="-1" x2="20" y2="12"/>
        <line x1="30" y1="-1" x2="30" y2="12"/><line x1="40" y1="-1" x2="40" y2="12"/>
        <line x1="50" y1="-1" x2="50" y2="12"/><line x1="60" y1="-1" x2="60" y2="12"/>
        <line x1="70" y1="-1" x2="70" y2="12"/><line x1="80" y1="-1" x2="80" y2="12"/>
        <line x1="90" y1="-1" x2="90" y2="12"/><line x1="100" y1="-1" x2="100" y2="12"/>
        <line x1="110" y1="-1" x2="110" y2="12"/><line x1="120" y1="-1" x2="120" y2="12"/>
        <line x1="130" y1="-1" x2="130" y2="12"/><line x1="140" y1="-1" x2="140" y2="12"/>
        <line x1="150" y1="-1" x2="150" y2="12"/><line x1="160" y1="-1" x2="160" y2="12"/>
        <line x1="170" y1="-1" x2="170" y2="12"/><line x1="180" y1="-1" x2="180" y2="12"/>
      </g>
    </g>

    <!-- open scissors, tips up -->
    <g transform="translate(186,152) rotate(10)">
      <!-- crossed handle arms -->
      <path d="M0 0 L16 30" fill="none" stroke="#2a635a" stroke-width="5" stroke-linecap="round"/>
      <path d="M0 0 L-16 30" fill="none" stroke="#2a635a" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="18" cy="40" rx="8" ry="10" fill="none" stroke="#2a635a" stroke-width="5"/>
      <ellipse cx="-18" cy="40" rx="8" ry="10" fill="none" stroke="#2a635a" stroke-width="5"/>
      <!-- blades -->
      <path d="M-2 -4 L-12 -80 Q-8 -87 -4 -80 L2 -4 Z" fill="url(#t2blade)"/>
      <path d="M2 -4 L12 -74 Q8 -81 4 -74 L-2 -4 Z" fill="url(#t2blade)"/>
      <path d="M-6 -10 L-11 -76" fill="none" stroke="#cfeee6" stroke-width="1.4" stroke-linecap="round" opacity="0.4"/>
      <!-- pivot: the single amber note -->
      <circle cx="0" cy="0" r="4.4" fill="#e8b23a"/>
      <circle cx="0" cy="0" r="4.4" fill="none" stroke="#8f6417" stroke-width="1"/>
    </g>

    <rect width="320" height="240" fill="url(#t2vig)"/>
  </svg>
</div>
