<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e">
<div style="width:1080px;height:450px">

                      <radialGradient id="hvbg" cx="30%" cy="10%" r="118%">

                    <ellipse cx="196" cy="88" rx="106" ry="47" fill="#04140f" opacity="0.5" filter="url(#hvblur)"/>
                    <ellipse cx="192" cy="76" rx="101" ry="43" fill="url(#hvplate)"/>
                    <ellipse cx="192" cy="76" rx="101" ry="43" fill="none" stroke="#66a89a" stroke-opacity="0.45" stroke-width="1.5"/>

                    <path d="M180 59 Q200 47 216 52 Q214 60 214 63 Q196 60 180 59 Z" fill="url(#hvfish)"/>
                    <path d="M140 76 Q148 60 186 58 Q220 58 230 70 Q246 64 258 58 Q250 70 246 76 Q250 82 258 94 Q246 88 230 82 Q220 94 186 94 Q148 92 140 76 Z" fill="url(#hvfish)"/>
                    <circle cx="152" cy="72" r="3" fill="#07211d"/>

                    <rect width="360" height="150" fill="url(#hvvig)"/>
