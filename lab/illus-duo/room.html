<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e">
<div style="width:840px;height:630px">
  <svg viewBox="0 0 320 240" width="840" height="630" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false">
    <defs>
      <radialGradient id="rmbg" cx="32%" cy="12%" r="118%">
        <stop offset="0" stop-color="#1c4c44"/>
        <stop offset="55%" stop-color="#103b34"/>
        <stop offset="100%" stop-color="#07211d"/>
      </radialGradient>
      <linearGradient id="rmfloor" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#0d302a"/>
        <stop offset="100%" stop-color="#081f1b"/>
      </linearGradient>
      <radialGradient id="rmglow" cx="50%" cy="42%" r="60%">
        <stop offset="0" stop-color="#e8b23a" stop-opacity="0.55"/>
        <stop offset="55%" stop-color="#e8b23a" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#e8b23a" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="rmtable" cx="42%" cy="30%" r="80%">
        <stop offset="0" stop-color="#40897a"/>
        <stop offset="70%" stop-color="#2a635a"/>
        <stop offset="100%" stop-color="#193f38"/>
      </radialGradient>
      <radialGradient id="rmvig" cx="50%" cy="46%" r="74%">
        <stop offset="50%" stop-color="#000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#04140f" stop-opacity="0.55"/>
      </radialGradient>
    </defs>
    <rect width="320" height="240" fill="url(#rmbg)"/>
    <rect x="0" y="168" width="320" height="72" fill="url(#rmfloor)"/>
    <line x1="0" y1="168" x2="320" y2="168" stroke="#2f6459" stroke-opacity="0.4" stroke-width="1"/>

    <!-- two quiet chair-back silhouettes flanking the plate: they recede into the dark so the room reads as a room, never competing with the amber pool -->
    <path d="M50 214 L50 148 Q50 137 64 137 Q78 137 78 148 L78 214 Z" fill="#143c35"/>
    <path d="M270 214 L270 148 Q270 137 256 137 Q242 137 242 148 L242 214 Z" fill="#123830"/>

    <!-- pendant light: cord, shade, bulb with a tight amber halo (the single accent) -->
    <line x1="160" y1="0" x2="160" y2="52" stroke="#5AD2C4" stroke-opacity="0.5" stroke-width="1.4"/>
    <path d="M144 52 L176 52 L169 80 L151 80 Z" fill="#40897a"/>
    <path d="M144 52 L160 52 L151 80 Z" fill="#5AD2C4" opacity="0.5"/>
    <ellipse cx="160" cy="82" rx="20" ry="13" fill="url(#rmglow)"/>
    <ellipse cx="160" cy="80" rx="9" ry="3.4" fill="#e8b23a"/>

    <!-- a single plate resting under the pendant, generous negative space around -->
    <ellipse cx="160" cy="200" rx="66" ry="18" fill="#04140f" opacity="0.45"/>
    <ellipse cx="160" cy="188" rx="66" ry="22" fill="url(#rmtable)"/>
    <ellipse cx="160" cy="188" rx="66" ry="22" fill="none" stroke="#66a89a" stroke-opacity="0.45" stroke-width="1.4"/>
    <path d="M110 182 Q160 168 210 182" fill="none" stroke="#cfeee6" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>

    <rect width="320" height="240" fill="url(#rmvig)"/>
  </svg>
</div>
</body>
