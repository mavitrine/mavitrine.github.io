<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e">
<div style="width:840px;height:630px">
<svg viewBox="0 0 320 240" width="840" height="630" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="d_bg" cx="30%" cy="14%" r="120%">
      <stop offset="0" stop-color="#164138"/>
      <stop offset="46%" stop-color="#0d302a"/>
      <stop offset="100%" stop-color="#07211d"/>
    </radialGradient>
    <linearGradient id="d_table" x1="0" y1="0" x2="0.15" y2="1">
      <stop offset="0" stop-color="#43301f"/>
      <stop offset="55%" stop-color="#2c1f13"/>
      <stop offset="100%" stop-color="#160f0a"/>
    </linearGradient>
    <linearGradient id="d_wine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0d98a"/>
      <stop offset="55%" stop-color="#d9b45a"/>
      <stop offset="100%" stop-color="#b3893a"/>
    </linearGradient>
    <linearGradient id="d_glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="30%" stop-color="#cfe0da" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="#cfe0da" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="d_napkin" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0" stop-color="#e2e7df"/>
      <stop offset="55%" stop-color="#bdc5bc"/>
      <stop offset="100%" stop-color="#889289"/>
    </linearGradient>
    <linearGradient id="d_steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ee"/>
      <stop offset="50%" stop-color="#aab5ad"/>
      <stop offset="100%" stop-color="#6d786f"/>
    </linearGradient>
    <radialGradient id="d_candle" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffd98a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="d_spec" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="d_bok_w" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffcf7a" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#ffcf7a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffcf7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="d_bok_teal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5fb8a6" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#5fb8a6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#5fb8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="d_blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="d_bokblur" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="d_soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.2"/></filter>
    <filter id="d_grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <radialGradient id="d_vig" cx="46%" cy="42%" r="74%">
      <stop offset="46%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#03120e" stop-opacity="0.66"/>
    </radialGradient>
  </defs>

  <rect width="320" height="240" fill="url(#d_bg)"/>

  <!-- bokeh background (soft, out of focus) -->
  <g filter="url(#d_bokblur)">
    <circle cx="58" cy="46" r="26" fill="url(#d_bok_w)"/>
    <circle cx="118" cy="30" r="18" fill="url(#d_bok_teal)"/>
    <circle cx="196" cy="52" r="30" fill="url(#d_bok_w)"/>
    <circle cx="262" cy="34" r="20" fill="url(#d_bok_teal)"/>
    <circle cx="292" cy="86" r="24" fill="url(#d_bok_w)"/>
    <circle cx="24" cy="104" r="16" fill="url(#d_bok_teal)"/>
    <circle cx="150" cy="72" r="12" fill="url(#d_bok_w)"/>
    <circle cx="236" cy="96" r="14" fill="url(#d_bok_teal)"/>
  </g>

  <!-- table surface -->
  <path d="M0 158 L320 146 L320 240 L0 240 Z" fill="url(#d_table)"/>
  <g stroke="#573f26" stroke-width="1" opacity="0.35" fill="none">
    <path d="M0 178 Q160 168 320 162"/>
    <path d="M0 206 Q160 196 320 190"/>
  </g>
  <rect x="0" y="150" width="320" height="6" fill="#5a4127" opacity="0.35" filter="url(#d_soft)"/>

  <!-- candle glow behind, warm -->
  <ellipse cx="228" cy="130" rx="60" ry="60" fill="#ffcf7a" opacity="0.14" filter="url(#d_blur)"/>

  <!-- folded napkin (right-back) with cutlery on top -->
  <path d="M204 150 Q228 138 274 146 Q300 152 292 172 Q284 190 240 188 Q206 186 202 168 Z" fill="url(#d_napkin)"/>
  <g stroke="#98a196" stroke-width="1.3" opacity="0.5" fill="none" stroke-linecap="round">
    <path d="M214 154 Q248 150 284 158"/>
    <path d="M210 166 Q246 162 286 170"/>
  </g>
  <path d="M204 150 Q228 138 274 146 Q244 152 224 168 Q212 180 214 188 Q206 186 202 168 Z" fill="#fff" opacity="0.12"/>

  <!-- cutlery: knife + fork resting on napkin -->
  <ellipse cx="264" cy="166" rx="20" ry="6" fill="#20241c" opacity="0.4" filter="url(#d_soft)" transform="rotate(-8 250 168)"/>
  <g transform="rotate(-8 250 168)">
    <!-- knife -->
    <rect x="246" y="120" width="6" height="46" rx="3" fill="url(#d_steel)"/>
    <path d="M246 120 Q252 112 252 120 L252 132 L246 132 Z" fill="url(#d_steel)"/>
    <rect x="247" y="122" width="1.6" height="40" fill="#fff" opacity="0.5"/>
    <!-- fork -->
    <rect x="262" y="128" width="6" height="38" rx="3" fill="url(#d_steel)"/>
    <path d="M259 116 L260 130 L262 130 L262 116 Z" fill="url(#d_steel)"/>
    <path d="M263 116 L263 130 L265 130 L265 116 Z" fill="url(#d_steel)"/>
    <path d="M267 116 L267 130 L269 130 L269.5 116 Z" fill="url(#d_steel)"/>
  </g>

  <!-- candle (pillar) -->
  <ellipse cx="228" cy="146" rx="24" ry="10" fill="#03120e" opacity="0.5" filter="url(#d_blur)"/>
  <rect x="218" y="112" width="18" height="36" rx="3" fill="#e7ddc6"/>
  <rect x="218" y="112" width="6" height="36" rx="3" fill="#fff" opacity="0.35"/>
  <ellipse cx="227" cy="112" rx="9" ry="3.2" fill="#f0e6cf"/>
  <line x1="227" y1="112" x2="227" y2="106" stroke="#3a2a18" stroke-width="1.2"/>
  <ellipse cx="227" cy="100" rx="3" ry="6.5" fill="#ffd98a"/>
  <ellipse cx="227" cy="102" rx="1.4" ry="3.4" fill="#fff6d8"/>
  <ellipse cx="227" cy="98" rx="9" ry="14" fill="url(#d_candle)"/>

  <!-- WINE GLASS (foreground, sharp) -->
  <g>
    <!-- contact shadow / reflection -->
    <ellipse cx="112" cy="200" rx="42" ry="10" fill="#03120e" opacity="0.55" filter="url(#d_blur)"/>
    <!-- foot -->
    <ellipse cx="112" cy="198" rx="30" ry="8" fill="#cfe0da" opacity="0.22"/>
    <ellipse cx="112" cy="197" rx="30" ry="8" fill="none" stroke="#eaf3ef" stroke-opacity="0.4" stroke-width="1"/>
    <!-- stem -->
    <rect x="110" y="150" width="4" height="48" fill="#cfe0da" opacity="0.35"/>
    <rect x="110.5" y="150" width="1.4" height="48" fill="#fff" opacity="0.5"/>
    <!-- bowl outline -->
    <path d="M84 74 Q84 130 112 150 Q140 130 140 74 Q140 66 112 66 Q84 66 84 74 Z" fill="url(#d_glass)"/>
    <!-- wine liquid -->
    <path d="M90 104 Q98 138 112 148 Q126 138 134 104 Q112 112 90 104 Z" fill="url(#d_wine)"/>
    <!-- meniscus -->
    <path d="M90 104 Q112 112 134 104" fill="none" stroke="#fbeeb8" stroke-width="1.4" opacity="0.7"/>
    <!-- liquid specular -->
    <ellipse cx="100" cy="120" rx="5" ry="14" fill="url(#d_spec)" opacity="0.4" transform="rotate(8 100 120)"/>
    <!-- warm reflection of candle in wine -->
    <ellipse cx="126" cy="124" rx="4" ry="9" fill="#ffcf7a" opacity="0.4"/>
    <!-- glass rim -->
    <path d="M84 74 Q112 84 140 74" fill="none" stroke="#eaf3ef" stroke-opacity="0.55" stroke-width="1.4"/>
    <path d="M84 74 Q112 62 140 74" fill="none" stroke="#eaf3ef" stroke-opacity="0.4" stroke-width="1.2"/>
    <!-- bowl highlight streak (specular, top-left light) -->
    <path d="M92 80 Q90 112 106 140" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.55" filter="url(#d_soft)"/>
    <!-- right edge catchlight -->
    <path d="M136 80 Q138 108 126 134" fill="none" stroke="#eaf3ef" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>
  </g>

  <rect width="320" height="240" fill="url(#d_vig)"/>
  <rect width="320" height="240" filter="url(#d_grain)" opacity="0.5"/>
</svg>
</div>
</body>
