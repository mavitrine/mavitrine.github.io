<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e">
<div style="width:840px;height:630px">
<svg viewBox="0 0 320 240" width="840" height="630" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="r_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123833"/>
      <stop offset="60%" stop-color="#0d2c27"/>
      <stop offset="100%" stop-color="#09211d"/>
    </linearGradient>
    <linearGradient id="r_floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c1f14"/>
      <stop offset="55%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#20160d"/>
    </linearGradient>
    <linearGradient id="r_dusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5a63"/>
      <stop offset="40%" stop-color="#8a6a46"/>
      <stop offset="72%" stop-color="#d69447"/>
      <stop offset="100%" stop-color="#e7b25a"/>
    </linearGradient>
    <radialGradient id="r_bulb" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#ffe6a8"/>
      <stop offset="55%" stop-color="#f0b95a"/>
      <stop offset="100%" stop-color="#c98a3a"/>
    </radialGradient>
    <radialGradient id="r_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffcf7a" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffcf7a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r_shade" cx="50%" cy="20%" r="90%">
      <stop offset="0" stop-color="#4a3a26"/>
      <stop offset="100%" stop-color="#1c1409"/>
    </radialGradient>
    <!-- warm wood tabletop, candle-lit from the right -->
    <radialGradient id="r_woodtop" cx="62%" cy="40%" r="78%">
      <stop offset="0" stop-color="#7a5230"/>
      <stop offset="50%" stop-color="#513518"/>
      <stop offset="100%" stop-color="#2e1d0e"/>
    </radialGradient>
    <linearGradient id="r_woodedge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2614"/>
      <stop offset="100%" stop-color="#1a1108"/>
    </linearGradient>
    <radialGradient id="r_woodtop_bg" cx="50%" cy="40%" r="80%">
      <stop offset="0" stop-color="#5a3d20"/>
      <stop offset="100%" stop-color="#2a1b0d"/>
    </radialGradient>
    <filter id="r_blur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.6"/></filter>
    <filter id="r_soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.1"/></filter>
    <filter id="r_haze" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3.4"/></filter>
    <filter id="r_grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feComposite operator="over" in2="SourceGraphic"/></filter>
    <radialGradient id="r_vig" cx="50%" cy="42%" r="74%">
      <stop offset="46%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#03120e" stop-opacity="0.68"/>
    </radialGradient>
    <clipPath id="r_fgtop"><ellipse cx="196" cy="192" rx="72" ry="20"/></clipPath>
  </defs>

  <!-- back wall -->
  <rect width="320" height="150" fill="url(#r_wall)"/>
  <!-- floor receding (one-point perspective) -->
  <path d="M0 150 L320 150 L320 240 L0 240 Z" fill="url(#r_floor)"/>
  <g stroke="#1a120a" stroke-width="1" opacity="0.5">
    <path d="M120 150 L70 240"/>
    <path d="M160 150 L160 240"/>
    <path d="M200 150 L250 240"/>
    <path d="M96 150 L-10 240"/>
    <path d="M224 150 L330 240"/>
  </g>
  <g stroke="#4a3620" stroke-width="0.7" opacity="0.35">
    <path d="M0 176 L320 176"/><path d="M0 206 L320 206"/>
  </g>
  <!-- baseboard -->
  <rect x="0" y="146" width="320" height="6" fill="#08201c"/>

  <!-- window with evening light (back wall, left) -->
  <rect x="34" y="30" width="96" height="86" rx="3" fill="#0a2621"/>
  <rect x="38" y="34" width="88" height="78" fill="url(#r_dusk)"/>
  <!-- distant silhouettes in the dusk -->
  <path d="M38 96 L54 84 L70 96 L88 82 L104 96 L126 88 L126 112 L38 112 Z" fill="#2a3b3a" opacity="0.7"/>
  <!-- mullions -->
  <g fill="#0a2621">
    <rect x="80" y="34" width="4" height="78"/>
    <rect x="38" y="70" width="88" height="4"/>
  </g>
  <rect x="34" y="30" width="96" height="86" rx="3" fill="none" stroke="#1c443c" stroke-width="2"/>
  <!-- warm spill from window onto wall -->
  <ellipse cx="82" cy="120" rx="90" ry="30" fill="#d69447" opacity="0.1" filter="url(#r_haze)"/>

  <!-- framed art on right wall -->
  <rect x="228" y="46" width="52" height="42" rx="2" fill="#0c2a24" stroke="#1c443c" stroke-width="2"/>
  <rect x="234" y="52" width="40" height="30" fill="#2a4a44" opacity="0.6"/>

  <!-- pendant lights hanging -->
  <g>
    <line x1="120" y1="0" x2="120" y2="40" stroke="#0a1a17" stroke-width="1.4"/>
    <ellipse cx="120" cy="70" rx="34" ry="40" fill="#ffcf7a" opacity="0.14" filter="url(#r_haze)"/>
    <path d="M108 40 Q120 34 132 40 L128 58 Q120 62 112 58 Z" fill="url(#r_shade)"/>
    <ellipse cx="120" cy="58" rx="8" ry="4" fill="url(#r_bulb)"/>
    <ellipse cx="120" cy="58" rx="20" ry="12" fill="url(#r_glow)"/>
  </g>
  <g opacity="0.92">
    <line x1="210" y1="0" x2="210" y2="34" stroke="#0a1a17" stroke-width="1.2"/>
    <ellipse cx="210" cy="60" rx="26" ry="30" fill="#ffcf7a" opacity="0.12" filter="url(#r_haze)"/>
    <path d="M200 34 Q210 29 220 34 L217 49 Q210 52 203 49 Z" fill="url(#r_shade)"/>
    <ellipse cx="210" cy="49" rx="6" ry="3.4" fill="url(#r_bulb)"/>
    <ellipse cx="210" cy="49" rx="15" ry="9" fill="url(#r_glow)"/>
  </g>

  <!-- BACKGROUND table (small, blurred for depth) -->
  <g filter="url(#r_haze)" opacity="0.85">
    <ellipse cx="212" cy="152" rx="26" ry="9" fill="#03120e" opacity="0.55"/>
    <path d="M186 128 Q212 140 238 128 L238 135 Q212 147 186 135 Z" fill="url(#r_woodedge)"/>
    <ellipse cx="212" cy="128" rx="26" ry="9" fill="url(#r_woodtop_bg)"/>
    <path d="M232 118 q10 0 10 14 l0 18 -5 0 0 -18 q0 -9 -5 -9 Z" fill="#2a3b38"/>
    <path d="M192 118 q-10 0 -10 14 l0 18 5 0 0 -18 q0 -9 5 -9 Z" fill="#25332f"/>
  </g>

  <!-- MIDGROUND table (blurred lightly) -->
  <g filter="url(#r_blur)">
    <ellipse cx="92" cy="180" rx="42" ry="13" fill="#03120e" opacity="0.55"/>
    <path d="M52 146 Q92 164 132 146 L132 156 Q92 174 52 156 Z" fill="url(#r_woodedge)"/>
    <ellipse cx="92" cy="146" rx="40" ry="13" fill="url(#r_woodtop_bg)"/>
    <g clip-path="none" stroke="#3a2614" stroke-width="0.8" opacity="0.4" fill="none">
      <path d="M60 144 Q92 150 124 144"/>
    </g>
    <ellipse cx="82" cy="142" rx="12" ry="4" fill="#ffcf7a" opacity="0.3"/>
    <circle cx="92" cy="144" r="3" fill="#ffcf7a"/>
    <ellipse cx="92" cy="140" rx="7" ry="5" fill="url(#r_glow)"/>
    <path d="M126 130 q12 0 12 16 l0 22 -6 0 0 -22 q0 -10 -6 -10 Z" fill="#233230"/>
    <path d="M58 130 q-12 0 -12 16 l0 22 6 0 0 -22 q0 -10 6 -10 Z" fill="#2a3b38"/>
  </g>

  <!-- FOREGROUND table (sharp, large, solid wood) -->
  <g>
    <!-- grounding contact shadow on floor -->
    <ellipse cx="198" cy="216" rx="82" ry="18" fill="#03120e" opacity="0.6" filter="url(#r_blur)"/>
    <!-- chairs behind -->
    <path d="M250 176 q20 0 20 26 l0 40 -9 0 0 -40 q0 -18 -11 -18 Z" fill="#2e4340"/>
    <path d="M146 176 q-20 0 -20 26 l0 40 9 0 0 -40 q0 -18 11 -18 Z" fill="#263633"/>
    <!-- pedestal -->
    <rect x="190" y="196" width="12" height="30" fill="#3a2614"/>
    <rect x="191" y="196" width="3" height="30" fill="#5a3d20" opacity="0.8"/>
    <!-- table edge thickness (opaque wood) -->
    <path d="M124 192 Q196 216 268 192 L268 203 Q196 227 124 203 Z" fill="url(#r_woodedge)"/>
    <!-- opaque wood tabletop -->
    <ellipse cx="196" cy="192" rx="72" ry="20" fill="url(#r_woodtop)"/>
    <!-- wood grain on tabletop -->
    <g clip-path="url(#r_fgtop)" stroke="#3a2614" stroke-width="0.8" opacity="0.5" fill="none">
      <path d="M126 188 Q196 196 266 188"/>
      <path d="M130 194 Q196 202 262 194"/>
      <path d="M136 199 Q196 206 256 199"/>
      <path d="M132 184 Q196 190 260 184"/>
    </g>
    <g clip-path="url(#r_fgtop)" stroke="#7a5230" stroke-width="0.5" opacity="0.4" fill="none">
      <path d="M126 187 Q196 195 266 187"/>
      <path d="M130 193 Q196 201 262 193"/>
    </g>
    <!-- rim catchlight -->
    <ellipse cx="196" cy="192" rx="72" ry="20" fill="none" stroke="#8a5e34" stroke-opacity="0.5" stroke-width="1"/>
    <!-- candle specular sheen on wood -->
    <ellipse cx="220" cy="196" rx="30" ry="9" fill="#ffcf7a" opacity="0.22" filter="url(#r_soft)"/>
    <ellipse cx="176" cy="187" rx="20" ry="5" fill="#f0c680" opacity="0.16" filter="url(#r_soft)"/>
    <!-- table setting: plate -->
    <ellipse cx="176" cy="199" rx="16" ry="5" fill="#eef2ec"/>
    <ellipse cx="176" cy="198" rx="16" ry="5" fill="none" stroke="#fff" stroke-opacity="0.4" stroke-width="0.6"/>
    <ellipse cx="176" cy="198" rx="9" ry="3" fill="#c5ccc0"/>
    <!-- candle glow -->
    <ellipse cx="216" cy="188" rx="22" ry="20" fill="#ffcf7a" opacity="0.3" filter="url(#r_haze)"/>
    <ellipse cx="216" cy="194" rx="8" ry="3" fill="#04140f" opacity="0.4" filter="url(#r_soft)"/>
    <rect x="213" y="180" width="6" height="12" rx="2" fill="#e7ddc6"/>
    <rect x="213" y="180" width="2" height="12" rx="1" fill="#fff" opacity="0.4"/>
    <ellipse cx="216" cy="178" rx="2.4" ry="4.2" fill="#ffdf8c"/>
    <ellipse cx="216" cy="179" rx="1.1" ry="2.2" fill="#fff4d0"/>
    <!-- wine glass -->
    <ellipse cx="150" cy="196" rx="6" ry="2" fill="#04140f" opacity="0.4" filter="url(#r_soft)"/>
    <path d="M144 176 q6 10 6 18 q0 -8 6 -18 q-6 4 -12 0 Z" fill="#d9b45a" opacity="0.55"/>
    <path d="M144 176 q6 10 6 18 l0 2 M156 176 q-6 10 -6 18" fill="none" stroke="#cfe0da" stroke-width="1" opacity="0.6"/>
    <path d="M150 194 l0 4" stroke="#cfe0da" stroke-width="1.4" opacity="0.5"/>
    <ellipse cx="150" cy="199" rx="6" ry="1.6" fill="none" stroke="#cfe0da" stroke-width="0.9" opacity="0.5"/>
  </g>

  <rect width="320" height="240" fill="url(#r_vig)"/>
  <rect width="320" height="240" filter="url(#r_grain)" opacity="0.5"/>
</svg>
</div>
</body>
</html>
