<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e">
<div style="width:1080px;height:450px">
<svg class="hv-photo" viewBox="0 0 360 150" width="1080" height="450" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="f_bg" cx="26%" cy="8%" r="120%">
      <stop offset="0" stop-color="#16403a"/>
      <stop offset="46%" stop-color="#0d302b"/>
      <stop offset="100%" stop-color="#07211d"/>
    </radialGradient>
    <linearGradient id="f_wood" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#3a2a1c"/>
      <stop offset="60%" stop-color="#2a1d13"/>
      <stop offset="100%" stop-color="#160f0a"/>
    </linearGradient>
    <radialGradient id="f_plate" cx="36%" cy="22%" r="86%">
      <stop offset="0" stop-color="#f2f5ef"/>
      <stop offset="38%" stop-color="#dbe1d7"/>
      <stop offset="72%" stop-color="#a4b2a5"/>
      <stop offset="100%" stop-color="#586759"/>
    </radialGradient>
    <radialGradient id="f_well" cx="42%" cy="30%" r="78%">
      <stop offset="0" stop-color="#ebefe6"/>
      <stop offset="60%" stop-color="#c7cfc2"/>
      <stop offset="100%" stop-color="#8b9a8c"/>
    </radialGradient>
    <linearGradient id="f_platehi" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="f_sauce" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#7a4a1e"/>
      <stop offset="50%" stop-color="#5c3413"/>
      <stop offset="100%" stop-color="#3a2411"/>
    </linearGradient>
    <linearGradient id="f_flesh" x1="0.15" y1="0" x2="0.55" y2="1">
      <stop offset="0" stop-color="#f6e6d8"/>
      <stop offset="42%" stop-color="#e6bfa4"/>
      <stop offset="78%" stop-color="#cf9878"/>
      <stop offset="100%" stop-color="#9c6a53"/>
    </linearGradient>
    <radialGradient id="f_belly" cx="50%" cy="30%" r="80%">
      <stop offset="0" stop-color="#f0dccb" stop-opacity="0"/>
      <stop offset="70%" stop-color="#7a5c50" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1d3a34" stop-opacity="0.55"/>

    <linearGradient id="f_skin" x1="0.1" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#c78a48"/>
      <stop offset="42%" stop-color="#9c5f2c"/>
      <stop offset="100%" stop-color="#5c3418"/>
    </linearGradient>
    <linearGradient id="f_tail" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#c98a4b"/>
      <stop offset="55%" stop-color="#8a5028"/>
      <stop offset="100%" stop-color="#4a2a14"/>
    </linearGradient>
    <linearGradient id="f_steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ee"/>
      <stop offset="42%" stop-color="#b7c1b9"/>
      <stop offset="72%" stop-color="#828d84"/>
      <stop offset="100%" stop-color="#586158"/>
    </linearGradient>
    <linearGradient id="f_steel2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f4f7f3"/>
      <stop offset="50%" stop-color="#9aa69c"/>
      <stop offset="100%" stop-color="#5f6a60"/>
    </linearGradient>
    <radialGradient id="f_sheen" cx="42%" cy="30%" r="60%">
      <stop offset="0" stop-color="#fff8ee" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#fff2df" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f_spec" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="f_lemon" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#f6e08a"/>
      <stop offset="100%" stop-color="#cba63f"/>
    </linearGradient>
    <filter id="f_blur" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4.5"/></filter>
    <filter id="f_soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="1.4"/></filter>

    <path d="M0 124 Q180 116 360 112"/>
    <path d="M0 140 Q180 133 360 129"/>
  </g>
  <g stroke="#6a4c2c" stroke-width="0.5" opacity="0.28" fill="none">
    <path d="M40 100 Q60 118 48 148"/>
    <path d="M260 94 Q276 116 268 148"/>
  </g>
  <rect x="0" y="82" width="360" height="5" fill="#5a4127" opacity="0.35" filter="url(#f_soft)"/>

  <!-- soft cast shadow (light top-left -> shadow lower-right) -->
  <ellipse cx="194" cy="100" rx="114" ry="40" fill="#03120e" opacity="0.55" filter="url(#f_blur)"/>

  <!-- ceramic plate -->
  <ellipse cx="185" cy="80" rx="112" ry="45" fill="url(#f_plate)"/>

  <path d="M210 118 Q262 112 288 90 Q272 108 232 118 Q220 120 210 118 Z" fill="#c8853a" opacity="0.18" filter="url(#f_soft)"/>

  <ellipse cx="185" cy="80" rx="112" ry="45" fill="none" stroke="#f6f9f3" stroke-opacity="0.4" stroke-width="1.1"/>
  <ellipse cx="185" cy="81" rx="112" ry="45" fill="none" stroke="#03120e" stroke-opacity="0.35" stroke-width="1"/>
  <!-- inner well -->
  <ellipse cx="185" cy="80" rx="88" ry="34" fill="url(#f_well)"/>
  <ellipse cx="185" cy="80" rx="88" ry="34" fill="none" stroke="#6c7a6d" stroke-opacity="0.5" stroke-width="1.2"/>
  <!-- glossy highlight arc, top-left -->
  <path d="M96 72 Q120 46 178 40 Q140 50 118 68 Q106 72 96 72 Z" fill="url(#f_platehi)" opacity="0.75" filter="url(#f_soft)"/>
  <ellipse cx="150" cy="56" rx="30" ry="7" fill="#ffffff" opacity="0.4" filter="url(#f_soft)" transform="rotate(-18 150 56)"/>

  <!-- sauce swoosh under fish -->
  <path d="M112 92 Q150 108 210 100 Q256 94 268 76 Q252 88 210 90 Q156 94 124 82 Q116 86 112 92 Z" fill="url(#f_sauce)" opacity="0.92"/>
  <path d="M128 90 Q170 100 216 92" fill="none" stroke="#a9713a" stroke-width="1.3" stroke-linecap="round" opacity="0.5" filter="url(#f_soft)"/>
  <ellipse cx="150" cy="90" rx="10" ry="3" fill="url(#f_spec)" opacity="0.4"/>

  <!-- ===== FISH ===== -->
  <!-- fish contact shadow on plate -->
  <ellipse cx="182" cy="94" rx="92" ry="17" fill="#04140f" opacity="0.4" filter="url(#f_blur)"/>

  <!-- tail fin (forked) -->
  <path d="M244 67 L288 49 L269 79 L288 109 L244 92 Q250 79 244 67 Z" fill="url(#f_tail)"/>
  <g stroke="#3a2110" stroke-width="0.8" opacity="0.6" fill="none" stroke-linecap="round">
    <path d="M250 72 L282 55"/><path d="M252 79 L286 79"/><path d="M250 87 L282 103"/>
  </g>
  <path d="M246 70 L272 58" stroke="#e7b877" stroke-width="0.9" opacity="0.55"/>

  <!-- dorsal fin -->
  <path d="M150 57 Q158 41 170 50 Q180 39 192 50 Q202 41 214 56 Q182 52 150 57 Z" fill="url(#f_skin)"/>
  <g stroke="#3a2110" stroke-width="0.7" opacity="0.5"><path d="M162 54 L166 44"/><path d="M180 52 L182 42"/><path d="M198 52 L202 45"/></g>

  <!-- anal / pelvic fin (belly) -->
  <path d="M172 100 Q182 114 196 102 Q184 104 172 100 Z" fill="url(#f_skin)" opacity="0.95"/>
  <!-- pectoral fin -->
  <path d="M136 84 Q146 103 162 92 Q148 94 136 84 Z" fill="url(#f_skin)" opacity="0.9"/>

  <!-- body flesh -->
  <path d="M100 80 Q118 59 160 55 Q210 52 250 66 Q255 78 250 90 Q210 104 160 101 Q118 98 100 80 Z" fill="url(#f_flesh)"/>

  <g clip-path="url(#f_bodyclip)">
    <!-- browned seared skin band along the back -->
    <path d="M100 80 Q118 59 160 55 Q210 52 250 66 Q210 66 160 68 Q120 70 100 80 Z" fill="url(#f_skin)" opacity="0.92"/>
    <!-- overlapping scale rows over the back -->
    <g fill="none" stroke="#5c3418" stroke-width="0.9" opacity="0.55" stroke-linecap="round">
      <path d="M120 62 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0"/>
      <path d="M126 68 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0"/>
      <path d="M132 74 q6 5 12 0 q6 5 12 0 q6 5 12 0 q6 5 12 0 q6 5 12 0 q6 5 12 0 q6 5 12 0"/>
    </g>
    <g fill="none" stroke="#e8b57e" stroke-width="0.7" opacity="0.45" stroke-linecap="round">
      <path d="M120 61 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0"/>
      <path d="M126 67 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0 q6 6 12 0"/>
    </g>
    <!-- char flecks on seared skin -->
    <g fill="#2e1808" opacity="0.5">
      <ellipse cx="150" cy="60" rx="4" ry="1.4"/><ellipse cx="188" cy="59" rx="5" ry="1.5"/><ellipse cx="220" cy="64" rx="3.4" ry="1.3"/><ellipse cx="128" cy="66" rx="3" ry="1.2"/>
    </g>
    <!-- flesh flake seams lower body -->
    <g stroke="#c69172" stroke-width="1" opacity="0.6" fill="none" stroke-linecap="round">
      <path d="M120 84 Q150 80 186 84"/>
      <path d="M126 90 Q160 87 208 90"/>
      <path d="M140 96 Q176 94 220 95"/>
    </g>
    <g stroke="#8a5c47" stroke-width="0.8" opacity="0.5" fill="none" stroke-linecap="round">
      <path d="M120 87 Q150 83 186 87"/>
      <path d="M126 93 Q160 90 208 93"/>
    </g>
    <!-- belly / far-side core shadow (teal-tinted) -->
    <path d="M100 80 Q118 98 160 101 Q210 104 250 90 Q210 100 160 96 Q120 92 100 80 Z" fill="url(#f_belly)"/>

    <ellipse cx="158" cy="68" rx="46" ry="12" fill="url(#f_sheen)" transform="rotate(-8 158 68)"/>
    <path d="M126 66 Q160 60 206 65" fill="none" stroke="#fff7ec" stroke-width="2" stroke-linecap="round" opacity="0.7" filter="url(#f_soft)"/>
  </g>

  <!-- gill cover line -->
  <path d="M126 60 Q118 80 128 98" fill="none" stroke="#7a4426" stroke-width="1.6" opacity="0.7" stroke-linecap="round"/>
  <path d="M124 61 Q117 80 126 97" fill="none" stroke="#f0cba0" stroke-width="0.7" opacity="0.5" stroke-linecap="round"/>

  <!-- head glaze + eye + mouth -->
  <path d="M100 80 Q108 66 124 62 Q118 80 126 96 Q110 92 100 80 Z" fill="#8a5028" opacity="0.5"/>
  <circle cx="113" cy="74" r="4.4" fill="#20140c"/>
  <circle cx="113" cy="74" r="4.4" fill="none" stroke="#caa06a" stroke-width="0.8" opacity="0.7"/>
  <circle cx="111.4" cy="72.4" r="1.5" fill="#fff" opacity="0.85"/>
  <path d="M100 82 Q106 85 113 83" fill="none" stroke="#3a2110" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>

  <g transform="rotate(-12 250 98)">
    <path d="M238 96 Q252 88 266 96 Q252 100 238 96 Z" fill="url(#f_lemon)"/>
    <path d="M238 96 Q252 92 266 96" fill="none" stroke="#fff3c0" stroke-width="0.8" opacity="0.7"/>
    <path d="M242 95 L252 93 M252 93 L262 95 M252 90 L252 96" stroke="#e8cf72" stroke-width="0.5" opacity="0.7"/>
    <path d="M238 96 Q252 100 266 96 Q252 102 238 96 Z" fill="#c39a34" opacity="0.5"/>
  </g>

  <!-- herb garnish: microgreen sprig -->
  <g stroke="#3f7d54" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M204 58 Q210 48 208 40"/>
    <path d="M204 58 Q198 50 196 42"/>
    <path d="M204 58 Q212 52 218 48"/>
  </g>
  <g fill="#5c9b6c">
    <ellipse cx="208" cy="39" rx="2.6" ry="1.4" transform="rotate(-30 208 39)"/>
    <ellipse cx="196" cy="41" rx="2.4" ry="1.3" transform="rotate(30 196 41)"/>
    <ellipse cx="218" cy="47" rx="2.4" ry="1.3" transform="rotate(-10 218 47)"/>
  </g>
  <!-- capers / sauce dots -->
  <circle cx="146" cy="96" r="2.2" fill="#6a4322"/>
  <circle cx="232" cy="92" r="1.8" fill="#6a4322"/>
  <circle cx="145.2" cy="95.2" r="0.7" fill="#c99a5a" opacity="0.7"/>

  <!-- ===== CUTLERY (whole, resting on table, right) ===== -->
  <!-- contact shadow -->
  <ellipse cx="326" cy="120" rx="30" ry="8" fill="#04140f" opacity="0.5" filter="url(#f_blur)"/>
  <ellipse cx="322" cy="90" rx="7" ry="42" fill="#04140f" opacity="0.3" filter="url(#f_blur)" transform="rotate(8 322 90)"/>

  <g transform="rotate(8 306 90)">
    <rect x="302" y="86" width="8" height="46" rx="3.5" fill="url(#f_steel)"/>
    <rect x="303.4" y="88" width="1.6" height="40" rx="0.8" fill="#fff" opacity="0.5"/>
    <path d="M302 88 L302 46 Q302 38 310 40 L311 88 Z" fill="url(#f_steel2)"/>
    <path d="M310 42 L311 86" stroke="#fff" stroke-width="0.9" opacity="0.6"/>
    <path d="M303 50 Q304 68 304 86" stroke="#5f6a60" stroke-width="0.8" opacity="0.5" fill="none"/>
  </g>

  <!-- fork -->
  <g transform="rotate(9 340 90)">
    <rect x="336" y="82" width="7.5" height="48" rx="3.5" fill="url(#f_steel)"/>
    <rect x="337.4" y="84" width="1.4" height="42" rx="0.7" fill="#fff" opacity="0.5"/>
    <path d="M334 82 Q334 70 340 68 Q346 70 346 82 Z" fill="url(#f_steel2)"/>
    <path d="M334 70 L334 48 L336 48 L336.5 70 Z" fill="url(#f_steel2)"/>
    <path d="M337.5 70 L337.5 46 L339.5 46 L339.5 70 Z" fill="url(#f_steel2)"/>
    <path d="M341 70 L341 46 L343 46 L342.5 70 Z" fill="url(#f_steel2)"/>
    <path d="M344.5 70 L345 48 L347 48 L346.5 70 Z" fill="url(#f_steel2)"/>
    <path d="M339 84 L340 128" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  </g>

  <rect width="360" height="150" fill="url(#f_vig)"/>
  <rect width="360" height="150" filter="url(#f_grain)" opacity="0.5"/>
</svg>
