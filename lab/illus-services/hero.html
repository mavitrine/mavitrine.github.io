<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e"><div style="width:1080px;height:450px">
  <svg viewBox="0 0 360 150" width="1080" height="450" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
    <defs>
      <radialGradient id="shbg" cx="32%" cy="12%" r="120%">
        <stop offset="0" stop-color="#1c4c44"/>
        <stop offset="55%" stop-color="#103b34"/>
        <stop offset="100%" stop-color="#07211d"/>
      </radialGradient>
      <linearGradient id="shdesk" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#40897a"/>
        <stop offset="100%" stop-color="#1c4c44"/>
      </linearGradient>
      <linearGradient id="shlid" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#2a635a"/>
        <stop offset="100%" stop-color="#173e37"/>
      </linearGradient>
      <linearGradient id="shscreen" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#40897a"/>
        <stop offset="100%" stop-color="#22574e"/>
      </linearGradient>
      <linearGradient id="shcone" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#cfeee6" stop-opacity="0.20"/>
        <stop offset="100%" stop-color="#cfeee6" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="shvig" cx="46%" cy="42%" r="76%">
        <stop offset="52%" stop-color="#000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#04140f" stop-opacity="0.5"/>
      </radialGradient>
    </defs>
    <rect width="360" height="150" fill="url(#shbg)"/>

    <!-- the desk: one plane across the frame -->
    <rect x="0" y="112" width="360" height="38" fill="#0d2b26"/>
    <rect x="0" y="112" width="360" height="8" rx="2" fill="url(#shdesk)"/>
    <rect x="0" y="113" width="360" height="1.8" fill="#cfeee6" opacity="0.22"/>

    <!-- the laptop, open, three-quarter -->
    <ellipse cx="180" cy="114" rx="82" ry="6" fill="#04140f" opacity="0.45"/>
    <rect x="116" y="56" width="128" height="54" rx="3" fill="url(#shlid)"/>
    <rect x="122" y="61" width="116" height="44" rx="2" fill="url(#shscreen)"/>
    <path d="M132 61 L152 61 L138 105 L122 105 Z" fill="#cfeee6" opacity="0.10"/>
    <rect x="104" y="108" width="152" height="7" rx="3" fill="url(#shdesk)"/>
    <rect x="110" y="109.4" width="140" height="1.8" rx="1" fill="#cfeee6" opacity="0.26"/>

    <!-- a notebook set square beside it -->
    <ellipse cx="300" cy="112" rx="42" ry="5" fill="#04140f" opacity="0.4"/>
    <rect x="266" y="98" width="70" height="12" rx="2" fill="#173e37"/>
    <rect x="270" y="88" width="70" height="12" rx="2" fill="#22574e"/>
    <rect x="274" y="80" width="70" height="10" rx="2" fill="#2a635a"/>
    <rect x="278" y="81.4" width="60" height="1.8" rx="1" fill="#cfeee6" opacity="0.26"/>

    <!-- the desk lamp: the single warm note -->
    <path d="M55 42 L71 42 L96 112 L30 112 Z" fill="url(#shcone)"/>
    <ellipse cx="30" cy="112" rx="18" ry="5" fill="#04140f" opacity="0.4"/>
    <path d="M30 110 V38 Q30 26 44 26 H63" fill="none" stroke="#22574e" stroke-width="3.2" stroke-linecap="round"/>
    <rect x="16" y="106" width="28" height="6" rx="3" fill="#22574e"/>
    <path d="M48 26 h30 l-7 16 h-16 Z" fill="url(#shlid)"/>
    <ellipse cx="63" cy="42" rx="8" ry="2.4" fill="#e8b23a"/>

    <rect width="360" height="150" fill="url(#shvig)"/>
  </svg>
</div>
