<!doctype html><meta charset=utf-8><body style="margin:0;background:#0b0f0e"><div style="width:1080px;height:450px">
  <svg viewBox="0 0 360 150" width="1080" height="450" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
    <defs>
      <radialGradient id="mhbg" cx="32%" cy="12%" r="120%">
        <stop offset="0" stop-color="#1c4c44"/>
        <stop offset="55%" stop-color="#103b34"/>
        <stop offset="100%" stop-color="#07211d"/>
      </radialGradient>
      <linearGradient id="mhbody" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#40897a"/>
        <stop offset="55%" stop-color="#2a635a"/>
        <stop offset="100%" stop-color="#1c4c44"/>
      </linearGradient>
      <linearGradient id="mhcap" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#2a635a"/>
        <stop offset="100%" stop-color="#173e37"/>
      </linearGradient>
      <linearGradient id="mhbench" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#22574e"/>
        <stop offset="100%" stop-color="#0f322c"/>
      </linearGradient>
      <radialGradient id="mhvig" cx="46%" cy="42%" r="76%">
        <stop offset="52%" stop-color="#000" stop-opacity="0"/>
        <stop offset="100%" stop-color="#04140f" stop-opacity="0.5"/>
      </radialGradient>
    </defs>
    <rect width="360" height="150" fill="url(#mhbg)"/>

    <!-- the bench, seen edge-on: one plane the tool rests along -->
    <rect x="0" y="112" width="360" height="38" fill="url(#mhbench)"/>
    <rect x="0" y="126" width="360" height="24" fill="#0d2b26"/>
    <path d="M0 126 H360" stroke="#0a2320" stroke-width="1.4" opacity="0.9"/>
    <rect x="0" y="112" width="360" height="1.8" fill="#cfeee6" opacity="0.2"/>

    <!-- the spirit level: one long confident bar for one long frame -->
    <ellipse cx="182" cy="110" rx="152" ry="6" fill="#04140f" opacity="0.45"/>
    <rect x="30" y="66" width="300" height="42" rx="5" fill="url(#mhbody)"/>
    <rect x="38" y="68.5" width="284" height="2.2" rx="1.1" fill="#cfeee6" opacity="0.3"/>
    <rect x="30" y="66" width="18" height="42" rx="5" fill="url(#mhcap)"/>
    <rect x="312" y="66" width="18" height="42" rx="5" fill="url(#mhcap)"/>

    <!-- the two hand-holds, cut clean through the body -->
    <rect x="74" y="79" width="54" height="16" rx="8" fill="#103b34"/>
    <rect x="74" y="79" width="54" height="16" rx="8" fill="none" stroke="#0a2621" stroke-width="1"/>
    <rect x="232" y="79" width="54" height="16" rx="8" fill="#103b34"/>
    <rect x="232" y="79" width="54" height="16" rx="8" fill="none" stroke="#0a2621" stroke-width="1"/>

    <!-- the vial, dead centre: the single warm note, and the bubble sitting true -->
    <rect x="150" y="72" width="60" height="30" rx="5" fill="#0f322c"/>
    <rect x="156" y="79" width="48" height="16" rx="8" fill="#e8b23a"/>
    <circle cx="180" cy="87" r="5.4" fill="#f7e3b4"/>
    <path d="M170 79 V95 M190 79 V95" stroke="#8f6417" stroke-width="1.2" opacity="0.8"/>
    <path d="M158 81 H176" stroke="#f2cd7c" stroke-width="1.4" stroke-linecap="round" opacity="0.55"/>

    <rect width="360" height="150" fill="url(#mhvig)"/>
  </svg>
</div>
